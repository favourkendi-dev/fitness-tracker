{% extends 'base.html' %}
{% block title %}New Workout{% endblock %}
{% block content %}
<div class="card">
  <h1>Create Workout</h1>
  {% if errors %}
  <div class="error">{{ errors[0] }}</div>
  {% endif %}
  <form method="post">
    <label>Date</label>
    <input type="date" name="date" required />
    <label>Duration (minutes)</label>
    <input type="number" name="duration_minutes" min="1" required />
    <label>Notes</label>
    <textarea name="notes" rows="4"></textarea>
    <button class="btn" type="submit">Save workout</button>
    <a class="btn secondary" href="/dashboard/workouts">Cancel</a>
  </form>
</div>
{% endblock %}

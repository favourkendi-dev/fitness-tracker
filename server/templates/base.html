<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Fitness Tracker{% endblock %}</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f4f7fb;
        color: #1f2937;
      }
      nav {
        background: green;
        color: white;
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      nav a { color: white; text-decoration: none; margin-left: 1rem; }
      .container { max-width: 1100px; margin: 2rem auto; padding: 0 1rem 2rem; }
      .card { background: white; border-radius: 12px; padding: 1.25rem; box-shadow: 0 8px 24px rgba(0,0,0,0.08); margin-bottom: 1rem; }
      h1, h2 { color: green; }
      .grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
      table { width: 100%; border-collapse: collapse; }
      th, td { padding: 0.7rem; border-bottom: 1px solid #e5e7eb; text-align: left; }
      .btn { display: inline-block; padding: 0.6rem 0.9rem; background: green; color: white; text-decoration: none; border-radius: 6px; margin-right: 0.5rem; margin-top: 0.5rem; }
      .btn.secondary { background: #64748b; }
      .pill { display: inline-block; background: #dcfce7; color: #166534; padding: 0.3rem 0.6rem; border-radius: 999px; font-size: 0.9rem; }
      form { display: grid; gap: 0.75rem; max-width: 500px; }
      input, select, textarea { padding: 0.7rem; border: 1px solid #cbd5e1; border-radius: 6px; }
      .error { color: #b91c1c; }
    </style>
  </head>
  <body>
    <nav>
      <strong>Fitness Tracker</strong>
      <div>
        <a href="/">Home</a>
        <a href="/dashboard/workouts">Workouts</a>
        <a href="/dashboard/exercises">Exercises</a>
      </div>
    </nav>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
